# ============================================================
# Ice Cola Docker Compose
# ============================================================
# Deploy:  docker compose up -d
# Status:  docker compose ps
# Logs:    docker compose logs -f
# Stop:    docker compose down
# ============================================================

services:
  # ==========================================
  # Admin — React SPA served by nginx (port 80)
  # ==========================================
  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    container_name: ice-cola-admin
    ports:
      - "${ADMIN_PORT:-80}:80"
    depends_on:
      - ice-cola-server
    restart: unless-stopped
    networks:
      - ice-cola-net

  # ==========================================
  # NestJS API Server (port 3000)
  # ==========================================
  ice-cola-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ice-cola-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-icecola}?schema=public
      - HERMES_ENDPOINT=http://hermes-dashboard:9119
      - HERMES_AGENT_URL=${HERMES_AGENT_URL:-http://host.docker.internal:8642}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - AI_ENCRYPTION_KEY=${AI_ENCRYPTION_KEY:?AI_ENCRYPTION_KEY is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ice-cola-net

  # ==========================================
  # Hermes Agent — AI Gateway (host network)
  # ==========================================
  hermes-agent:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent
    command: ["gateway", "run"]
    network_mode: host
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
      - HERMES_DASHBOARD_TUI=0
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # ==========================================
  # Hermes Dashboard — Web UI (port 9119)
  # ==========================================
  hermes-dashboard:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-dashboard
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped
    networks:
      - ice-cola-net

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ice-cola-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-icecola}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    networks:
      - ice-cola-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-icecola}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# Persistent volumes
# ============================================================
volumes:
  hermes-data:
  postgres-data:

# ============================================================
# Networks
# ============================================================
networks:
  ice-cola-net:
    driver: bridge
