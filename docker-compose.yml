services:
  # Hermes Agent - AI Brain Service (NousResearch)
  hermes-agent:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent
    command: ["gateway", "run"]  # Run as gateway server
    network_mode: host
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
      - HERMES_DASHBOARD_TUI=0
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # Hermes Dashboard - Web UI on port 9119
  hermes-dashboard:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-dashboard
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]
    ports:
      - "9119:9119"
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # NestJS Server - API Gateway with Quota/Auth
  ice-cola-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ice-cola-server
    ports:
      - "3000:3000"  # NestJS HTTP API
      - "3001:3001"  # WebSocket Gateway
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/icecola?schema=public
      - HERMES_ENDPOINT=http://localhost:9119
      - JWT_SECRET=icecola-prod-secret-change-this
      - JWT_EXPIRES_IN=7d
      - WS_PORT=3001
      - RESEND_FROM_EMAIL=onboarding@resend.dev
      - RESEND_API_KEY=re_3znDftrT_Q54JGBmWMnuL7Lhmi26sXjDB
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ice-cola-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=icecola
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d icecola"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hermes-data:
  postgres-data:

networks:
  default:
    driver: bridge
