services:
  # Hermes Agent - AI Brain Service (NousResearch)
  hermes-agent:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent
    command: ["gateway", "run"]  # Run as gateway server
    network_mode: host
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
      - HERMES_DASHBOARD_TUI=0
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # Hermes Dashboard - Web UI on port 9119
  hermes-dashboard:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-dashboard
    command: ["dashboard", "--host", "0.0.0.0", "--insecure", "--no-open"]
    ports:
      - "${HERMES_DASHBOARD_HOST:-127.0.0.1}:9119:9119"
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # NestJS Server - API Gateway with Quota/Auth
  ice-cola-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ice-cola-server
    ports:
      - "3000:3000"  # NestJS HTTP API
      - "3001:3001"  # WebSocket Gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-icecola}?schema=public}
      - HERMES_ENDPOINT=${HERMES_ENDPOINT:-http://localhost:9119}
      - HERMES_AGENT_URL=${HERMES_AGENT_URL:-http://host.docker.internal:8642}
      - JWT_SECRET=${JWT_SECRET:-icecola-local-dev-jwt-secret-not-for-production}
      - AI_ENCRYPTION_KEY=${AI_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - WS_PORT=${WS_PORT:-3001}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ice-cola-postgres
    ports:
      - "${POSTGRES_HOST:-127.0.0.1}:5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-icecola}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hermes-data:
  postgres-data:

networks:
  default:
    driver: bridge
