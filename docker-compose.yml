services:
  # Hermes Agent - AI Brain Service (NousResearch)
  hermes-agent:
    build:
      context: ./packages/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes-agent
    command: ["gateway", "run"]  # Run as gateway server
    network_mode: host
    environment:
      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_WEB_DIST=/app/hermes_cli/web_dist
      - HERMES_DASHBOARD_TUI=0
    volumes:
      - hermes-data:/home/hermes/.hermes
    env_file:
      - ./packages/hermes-agent/.env
    restart: unless-stopped

  # NestJS Server - API Gateway with Quota/Auth
  ice-cola-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: ice-cola-server
    ports:
      - "3000:3000"  # NestJS HTTP API
      - "3001:3001"  # WebSocket Gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      - HERMES_ENDPOINT=${HERMES_ENDPOINT:?HERMES_ENDPOINT is required}
      - HERMES_AGENT_URL=${HERMES_AGENT_URL:?HERMES_AGENT_URL is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - AI_ENCRYPTION_KEY=${AI_ENCRYPTION_KEY:?AI_ENCRYPTION_KEY is required}
      - JWT_EXPIRES_IN=7d
      - WS_PORT=3001
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - RESEND_API_KEY=${RESEND_API_KEY:?RESEND_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ice-cola-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hermes-data:
  postgres-data:

networks:
  default:
    driver: bridge
